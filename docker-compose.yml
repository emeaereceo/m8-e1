services:
  db:
    image: "postgres:alpine3.19"
    container_name: modulo7
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    # volumes:
    #   - ./docker/postgres:/docker-entrypoint-initdb.d
volumes:
  pgdata:
